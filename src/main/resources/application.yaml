spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: fixed-asset
  datasource:
    url: jdbc:postgresql://localhost:5432/fixed_asset
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate
  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /api-doc.html
  api-docs:
    path: /fixed-asset-api